<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Cymbergaj</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    color: #e0e0e0;
    user-select: none;
  }

  #score {
    display: flex;
    gap: 80px;
    margin-bottom: 16px;
    font-size: 42px;
    font-weight: bold;
    letter-spacing: 4px;
  }
  .score-p1  { color: #4fc3f7; }
  .score-sep { color: #444; }
  .score-p2  { color: #ef5350; }

  #canvas { border: 2px solid #333; border-radius: 12px; cursor: none;
    box-shadow: 0 0 40px rgba(79,195,247,0.15); display: block; }

  #status {
    margin-top: 12px; font-size: 13px; color: #666; letter-spacing: 1px;
    min-height: 20px;
  }

  #overlay {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: rgba(0,0,0,0.82);
    font-size: 22px; gap: 16px;
    z-index: 10;
  }
  #overlay h1 { font-size: 48px; letter-spacing: 6px; color: #4fc3f7; }
  #overlay p  { color: #aaa; font-size: 15px; }
  #overlay.hidden { display: none; }

  #goal-msg {
    position: fixed; top: 38%; left: 50%; transform: translateX(-50%);
    font-size: 52px; font-weight: bold; color: #fff;
    text-shadow: 0 0 30px currentColor;
    pointer-events: none; opacity: 0;
    transition: opacity 0.25s; z-index: 20;
    white-space: nowrap;
  }
</style>
</head>
<body>

<div id="overlay">
  <h1>CYMBERGAJ</h1>
  <p id="overlay-msg">Łączenie z serwerem…</p>
</div>

<div id="score">
  <span class="score-p1" id="s1">0</span>
  <span class="score-sep">:</span>
  <span class="score-p2" id="s2">0</span>
</div>
<canvas id="canvas"></canvas>
<div id="status" id="status"></div>
<div id="goal-msg" id="goal-msg"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
// ── Canvas setup ───────────────────────────────────────────────────────────────
const canvas  = document.getElementById('canvas');
const ctx     = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const overlayMsg = document.getElementById('overlay-msg');
const statusEl   = document.getElementById('status');
const goalMsgEl  = document.getElementById('goal-msg');

const W = 900, H = 560;
canvas.width  = W;
canvas.height = H;

// Skalowanie na małe ekrany
function resize() {
  const scale = Math.min(1, (window.innerWidth - 20) / W, (window.innerHeight - 160) / H);
  canvas.style.width  = (W * scale) + 'px';
  canvas.style.height = (H * scale) + 'px';
}
resize();
window.addEventListener('resize', resize);

// ── Stałe (te same co serwer) ─────────────────────────────────────────────────
const PUCK_R   = 14;
const MALLET_R = 28;
const GOAL_W   = 130;
const GOAL_TOP = (H - GOAL_W) / 2;
const GOAL_BOT = (H + GOAL_W) / 2;

// ── Stan ───────────────────────────────────────────────────────────────────────
let myPlayer = 0; // 1, 2, lub 0 (widz)
let state = {
  puck:  { x: W/2, y: H/2, vx: 0, vy: 0 },
  m1:    { x: 88, y: H/2 },
  m2:    { x: W-88, y: H/2 },
  score: { p1: 0, p2: 0 },
};

// Predykcja klienta (interpolacja)
let prevState = null;
let lastServerTime = 0;
const INTERP_DELAY = 50; // ms

// Mysz / klawiatura
let mousePos   = { x: 0, y: 0 };
let prevMPos   = { x: 0, y: 0 };
let keys       = {};

// ── Socket.io ──────────────────────────────────────────────────────────────────
const socket = io({ transports: ['websocket', 'polling'] });

socket.on('connect', () => {
  overlayMsg.textContent = 'Połączono. Czekanie na drugiego gracza…';
});

socket.on('assigned', ({ player, roomId }) => {
  myPlayer = player;
  if (player === 1) {
    overlayMsg.textContent = 'Jesteś Graczem 1 (niebieski). Czekanie na przeciwnika…';
    statusEl.textContent = 'Sterowanie: mysz';
  } else if (player === 2) {
    overlayMsg.textContent = 'Jesteś Graczem 2 (czerwony). Czekanie na przeciwnika…';
    statusEl.textContent = 'Sterowanie: mysz';
  } else {
    overlayMsg.textContent = 'Oglądasz jako widz.';
    statusEl.textContent = 'Tryb widza';
  }
});

socket.on('lobby', ({ players, spectators }) => {
  if (players < 2) {
    overlayMsg.textContent = `Gracze: ${players}/2 — czekanie…`;
  }
  if (spectators > 0 && players >= 2) {
    statusEl.textContent = (myPlayer === 1 ? 'Sterowanie: mysz' : myPlayer === 2 ? 'Sterowanie: mysz' : 'Tryb widza')
      + `  |  Widzowie: ${spectators}`;
  }
});

socket.on('start', ({ score }) => {
  state.score = score;
  updateScoreUI();
  overlay.classList.add('hidden');
});

socket.on('state', (snap) => {
  prevState  = { ...state };
  state      = snap;
  lastServerTime = Date.now();
  updateScoreUI();
});

socket.on('goal', ({ who, score }) => {
  state.score = score;
  updateScoreUI();
  const name = who === 'p1' ? 'Gracz 1' : 'Gracz 2';
  const col  = who === 'p1' ? '#4fc3f7' : '#ef5350';
  goalMsgEl.style.color   = col;
  goalMsgEl.textContent   = `⚡ GOL! ${name} ⚡`;
  goalMsgEl.style.opacity = '1';
  setTimeout(() => goalMsgEl.style.opacity = '0', 1800);
});

socket.on('resume', () => {
  // stan przyjdzie w kolejnym 'state'
});

socket.on('player_left', ({ player }) => {
  overlay.classList.remove('hidden');
  overlayMsg.textContent = `Gracz ${player} wyszedł. Czekanie na nowego gracza…`;
});

socket.on('disconnect', () => {
  overlay.classList.remove('hidden');
  overlayMsg.textContent = 'Rozłączono z serwerem. Odśwież stronę.';
});

// ── Input ──────────────────────────────────────────────────────────────────────
canvas.addEventListener('mousemove', e => {
  const rect  = canvas.getBoundingClientRect();
  const scale = W / rect.width;
  mousePos.x  = (e.clientX - rect.left) * scale;
  mousePos.y  = (e.clientY - rect.top)  * scale;
});

document.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; });
document.addEventListener('keyup',   e => { keys[e.key.toLowerCase()] = false; });

// Wysyłaj input do serwera ~60Hz
const INPUT_RATE = 1000 / 60;
let lastInput = 0;

function sendInput() {
  const now = Date.now();
  if (now - lastInput < INPUT_RATE) return;
  lastInput = now;

  if (myPlayer === 1) {
    const dx = mousePos.x - prevMPos.x;
    const dy = mousePos.y - prevMPos.y;
    prevMPos = { ...mousePos };
    socket.emit('input', { dx, dy });
  } else if (myPlayer === 2) {
    const dx = mousePos.x - prevMPos.x;
    const dy = mousePos.y - prevMPos.y;
    prevMPos = { ...mousePos };
    socket.emit('input', { dx, dy });
  }
}

// ── Rendering ──────────────────────────────────────────────────────────────────
function drawTable() {
  ctx.fillStyle = '#0d1f1a';
  ctx.beginPath(); ctx.roundRect(0, 0, W, H, 10); ctx.fill();

  ctx.strokeStyle = '#1a3a2a'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.roundRect(1, 1, W-2, H-2, 10); ctx.stroke();

  ctx.setLineDash([12, 10]);
  ctx.strokeStyle = '#1e4030'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(W/2, 0); ctx.lineTo(W/2, H); ctx.stroke();
  ctx.setLineDash([]);

  ctx.strokeStyle = '#1e4030'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(W/2, H/2, 70, 0, Math.PI*2); ctx.stroke();

  // Bramki
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, GOAL_TOP, 8, GOAL_W);
  ctx.fillRect(W-8, GOAL_TOP, 8, GOAL_W);
  ctx.strokeStyle = '#4fc3f7'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(2, GOAL_TOP); ctx.lineTo(2, GOAL_BOT); ctx.stroke();
  ctx.strokeStyle = '#ef5350';
  ctx.beginPath(); ctx.moveTo(W-2, GOAL_TOP); ctx.lineTo(W-2, GOAL_BOT); ctx.stroke();
}

function drawGlow(x, y, r, color, alpha=0.35) {
  const g = ctx.createRadialGradient(x, y, 0, x, y, r*2.5);
  const c = color;
  g.addColorStop(0, c.replace(')', `,${alpha})`).replace('rgb','rgba'));
  g.addColorStop(1, c.replace(')', ',0)').replace('rgb','rgba'));
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(x, y, r*2.5, 0, Math.PI*2); ctx.fill();
}

function darken(hex, f) {
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return `rgb(${~~(r*f)},${~~(g*f)},${~~(b*f)})`;
}

function drawMallet(m, color, glowColor, isMe) {
  drawGlow(m.x, m.y, MALLET_R, glowColor, isMe ? 0.4 : 0.2);
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath(); ctx.arc(m.x+3, m.y+3, MALLET_R, 0, Math.PI*2); ctx.fill();
  const g = ctx.createRadialGradient(m.x-6, m.y-6, 2, m.x, m.y, MALLET_R);
  g.addColorStop(0, '#fff'); g.addColorStop(0.3, color); g.addColorStop(1, darken(color, 0.5));
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(m.x, m.y, MALLET_R, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = isMe ? 'rgba(255,255,255,0.6)' : 'rgba(255,255,255,0.25)';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(m.x, m.y, MALLET_R-3, 0, Math.PI*2); ctx.stroke();
}

function drawPuck() {
  const p = state.puck;
  const speed = Math.sqrt(p.vx**2 + p.vy**2);
  if (speed > 2) {
    const g = ctx.createLinearGradient(p.x-p.vx*3, p.y-p.vy*3, p.x, p.y);
    g.addColorStop(0, 'rgba(255,255,255,0)');
    g.addColorStop(1, `rgba(255,255,255,${Math.min(speed/60, 0.35)})`);
    ctx.strokeStyle = g; ctx.lineWidth = PUCK_R*1.5; ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(p.x-p.vx*3, p.y-p.vy*3); ctx.lineTo(p.x, p.y); ctx.stroke();
  }
  drawGlow(p.x, p.y, PUCK_R, 'rgb(220,220,255)', 0.4);
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.beginPath(); ctx.arc(p.x+2, p.y+2, PUCK_R, 0, Math.PI*2); ctx.fill();
  const pg = ctx.createRadialGradient(p.x-4, p.y-4, 1, p.x, p.y, PUCK_R);
  pg.addColorStop(0, '#d0d0e0'); pg.addColorStop(0.6, '#888899'); pg.addColorStop(1, '#333344');
  ctx.fillStyle = pg;
  ctx.beginPath(); ctx.arc(p.x, p.y, PUCK_R, 0, Math.PI*2); ctx.fill();
}

function updateScoreUI() {
  document.getElementById('s1').textContent = state.score.p1;
  document.getElementById('s2').textContent = state.score.p2;
}

// ── Pętla ─────────────────────────────────────────────────────────────────────
function loop() {
  requestAnimationFrame(loop);
  sendInput();

  ctx.clearRect(0, 0, W, H);
  drawTable();
  drawMallet(state.m2, '#ef5350', 'rgb(239,83,80)', myPlayer === 2);
  drawMallet(state.m1, '#4fc3f7', 'rgb(79,195,247)', myPlayer === 1);
  drawPuck();
}

loop();
</script>
</body>
</html>
