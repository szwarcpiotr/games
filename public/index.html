<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Gry</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    background: #0a0a0f;
    min-height: 100vh;
    min-height: 100dvh;
    font-family: 'Courier New', monospace;
    color: #e0e0e0;
    padding: 32px 16px;
  }

  h1 {
    text-align: center;
    font-size: clamp(20px, 6vw, 36px);
    letter-spacing: clamp(3px, 2.5vw, 8px);
    color: #4fc3f7;
    margin-bottom: clamp(24px, 5vw, 48px);
    text-transform: uppercase;
  }

  .grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 16px;
    max-width: 960px;
    margin: 0 auto;
  }

  .card {
    background: #0d1a14;
    border: 1px solid #1a3a2a;
    border-radius: 14px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.18s, border-color 0.18s, box-shadow 0.18s;
    text-decoration: none;
    display: block;
    -webkit-tap-highlight-color: transparent;
  }
  .card:hover {
    transform: translateY(-4px);
    border-color: #4fc3f7;
    box-shadow: 0 0 28px rgba(79,195,247,0.2);
  }
  .card:active {
    transform: scale(0.98);
    border-color: #4fc3f7;
  }

  .card-preview {
    width: 100%;
    aspect-ratio: 16/9;
    display: block;
    background: #0d1f1a;
  }

  .card-info {
    padding: 12px 16px;
    border-top: 1px solid #1a3a2a;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .card-text { flex: 1; }

  .card-title {
    font-size: clamp(13px, 3.5vw, 16px);
    font-weight: bold;
    letter-spacing: 2px;
    color: #e0e0e0;
    text-transform: uppercase;
  }

  .card-desc {
    font-size: clamp(10px, 2.5vw, 11px);
    color: #556;
    margin-top: 4px;
    letter-spacing: 1px;
  }

  .card-badge {
    display: inline-block;
    margin-top: 6px;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 20px;
    background: rgba(79,195,247,0.12);
    color: #4fc3f7;
    letter-spacing: 1px;
    white-space: nowrap;
  }

  /* Mobile: układ poziomy */
  @media (max-width: 480px) {
    body { padding: 24px 12px; }

    .card-inner {
      display: flex;
      align-items: stretch;
    }

    .card-preview {
      width: 120px;
      min-width: 120px;
      aspect-ratio: unset;
      height: auto;
      border-right: 1px solid #1a3a2a;
    }

    .card-info {
      border-top: none;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      padding: 12px 14px;
      gap: 4px;
    }

    .card-badge { margin-top: 4px; }
  }

  /* Tablet: 2 kolumny */
  @media (min-width: 480px) and (max-width: 767px) {
    .grid {
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }
  }

  /* Desktop: 3 kolumny */
  @media (min-width: 768px) {
    body { padding: 48px 32px; }

    .grid {
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }

    .card-info {
      padding: 14px 16px;
      flex-direction: column;
      align-items: flex-start;
      justify-content: flex-start;
      gap: 0;
    }

    .card-badge { margin-top: 8px; }
  }
</style>
</head>
<body>

<h1>🎮 Gry</h1>

<div class="grid">

  <a class="card" href="/cymbergaj">
    <div class="card-inner">
      <canvas class="card-preview" id="preview-cymbergaj"></canvas>
      <div class="card-info">
        <div class="card-text">
          <div class="card-title">Cymbergaj</div>
          <div class="card-desc">Air hockey dla 2 graczy</div>
        </div>
        <span class="card-badge">2 graczy • online</span>
      </div>
    </div>
  </a>

  <a class="card" href="/warcaby">
    <div class="card-inner">
      <canvas class="card-preview" id="preview-warcaby"></canvas>
      <div class="card-info">
        <div class="card-text">
          <div class="card-title">Warcaby</div>
          <div class="card-desc">Checkers dla 2 graczy</div>
        </div>
        <span class="card-badge">2 graczy • online</span>
      </div>
    </div>
  </a>

  <a class="card" href="/kosci">
    <div class="card-inner">
      <canvas class="card-preview" id="preview-kosci"></canvas>
      <div class="card-info">
        <div class="card-text">
          <div class="card-title">Kości</div>
          <div class="card-desc">Yahtzee dla 2–5 graczy</div>
        </div>
        <span class="card-badge">2–5 graczy • online</span>
      </div>
    </div>
  </a>

  <a class="card" href="/chinczyk">
    <div class="card-inner">
      <canvas class="card-preview" id="preview-chinczyk"></canvas>
      <div class="card-info">
        <div class="card-text">
          <div class="card-title">Chińczyk</div>
          <div class="card-desc">Klasyczna gra dla 2–4 graczy</div>
        </div>
        <span class="card-badge">2–4 graczy • online</span>
      </div>
    </div>
  </a>

</div>

<script>
function setupPreviewCanvas(canvas, drawFn) {
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  let lastW = -1, lastH = -1;

  function draw() {
    const dpr = window.devicePixelRatio || 1;
    const w = canvas.clientWidth;
    const h = canvas.clientHeight;
    if (w === 0 || h === 0) return;
    if (w === lastW && h === lastH) return;
    lastW = w; lastH = h;
    canvas.width  = w * dpr;
    canvas.height = h * dpr;
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.scale(dpr, dpr);
    ctx.clearRect(0, 0, w, h);
    drawFn(ctx, w, h);
  }

  const ro = new ResizeObserver(draw);
  ro.observe(canvas);
  draw();
}

// ── Miniaturka cymbergaja ─────────────────────────────────────────────────────
setupPreviewCanvas(document.getElementById('preview-cymbergaj'), (ctx, W, H) => {
  const sx = W / 900, sy = H / 560;
  const PUCK_R = 14*sx, MALLET_R = 28*sx;
  const GOAL_W = 130*sy, GOAL_TOP = (H-GOAL_W)/2, GOAL_BOT = (H+GOAL_W)/2;

  ctx.fillStyle = '#0d1f1a'; ctx.fillRect(0,0,W,H);
  ctx.setLineDash([8*sx,6*sx]); ctx.strokeStyle='#1e4030'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(W/2,0); ctx.lineTo(W/2,H); ctx.stroke();
  ctx.setLineDash([]);
  ctx.beginPath(); ctx.arc(W/2,H/2,70*sx,0,Math.PI*2); ctx.stroke();
  ctx.strokeStyle='#4fc3f7'; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.moveTo(2,GOAL_TOP); ctx.lineTo(2,GOAL_BOT); ctx.stroke();
  ctx.strokeStyle='#ef5350';
  ctx.beginPath(); ctx.moveTo(W-2,GOAL_TOP); ctx.lineTo(W-2,GOAL_BOT); ctx.stroke();

  function drawMallet(x,y,color) {
    const g=ctx.createRadialGradient(x-MALLET_R*.3,y-MALLET_R*.3,1,x,y,MALLET_R);
    g.addColorStop(0,'#fff'); g.addColorStop(.35,color); g.addColorStop(1,'rgba(0,0,0,0.6)');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(x,y,MALLET_R,0,Math.PI*2); ctx.fill();
  }
  function drawPuck(x,y) {
    const g=ctx.createRadialGradient(x-PUCK_R*.3,y-PUCK_R*.3,1,x,y,PUCK_R);
    g.addColorStop(0,'#d0d0e0'); g.addColorStop(.6,'#888899'); g.addColorStop(1,'#333344');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(x,y,PUCK_R,0,Math.PI*2); ctx.fill();
  }
  drawMallet(88*sx,H/2,'#4fc3f7');
  drawMallet((900-88)*sx,H/2,'#ef5350');
  drawPuck(W/2,H/2);
});

// ── Miniaturka warcabów ───────────────────────────────────────────────────────
setupPreviewCanvas(document.getElementById('preview-warcaby'), (ctx, W, H) => {
  const CELL = W / 8;
  for (let r=0;r<8;r++) for (let c=0;c<8;c++) {
    ctx.fillStyle = (r+c)%2===1 ? '#071510' : '#0d2a1f';
    ctx.fillRect(c*CELL,r*CELL,CELL,CELL);
  }
  const pr = CELL*.36;
  for (let r=0;r<8;r++) for (let c=0;c<8;c++) {
    if ((r+c)%2!==1) continue;
    let color = r<3?'#ef5350':r>4?'#4fc3f7':null;
    if (!color) continue;
    const x=c*CELL+CELL/2, y=r*CELL+CELL/2;
    ctx.fillStyle='rgba(0,0,0,0.3)'; ctx.beginPath(); ctx.arc(x+2,y+2,pr,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=color; ctx.beginPath(); ctx.arc(x,y,pr,0,Math.PI*2); ctx.fill();
  }
});

// ── Miniaturka kości ──────────────────────────────────────────────────────────
setupPreviewCanvas(document.getElementById('preview-kosci'), (ctx, W, H) => {
  ctx.fillStyle = '#0d1f1a'; ctx.fillRect(0,0,W,H);

  function pipPositions(n) {
    return { 1:[[50,50]], 2:[[28,28],[72,72]], 3:[[28,28],[50,50],[72,72]],
      4:[[28,28],[28,72],[72,28],[72,72]], 5:[[28,28],[28,72],[50,50],[72,28],[72,72]],
      6:[[28,25],[28,50],[28,75],[72,25],[72,50],[72,75]] }[n];
  }
  function drawDie(cx,cy,size,value,rot) {
    ctx.save(); ctx.translate(cx,cy); ctx.rotate(rot);
    const g=ctx.createLinearGradient(-size/2,-size/2,size/2,size/2);
    g.addColorStop(0,'#fdfdff'); g.addColorStop(1,'#c9c9d6');
    ctx.fillStyle=g; ctx.beginPath();
    ctx.roundRect(-size/2,-size/2,size,size,size*.16); ctx.fill();
    ctx.fillStyle='#1a1a2e';
    pipPositions(value).forEach(([px,py])=>{
      ctx.beginPath(); ctx.arc((px/100-.5)*size,(py/100-.5)*size,size*.07,0,Math.PI*2); ctx.fill();
    });
    ctx.restore();
  }
  const size = Math.min(W,H)*.32;
  drawDie(W*.28,H*.5,size,5,-0.12);
  drawDie(W*.52,H*.42,size,3,0.08);
  drawDie(W*.75,H*.55,size,6,-0.05);
});

// ── Miniaturka chińczyka ──────────────────────────────────────────────────────
setupPreviewCanvas(document.getElementById('preview-chinczyk'), (ctx, W, H) => {
  ctx.fillStyle = '#0a0a0f';
  ctx.fillRect(0, 0, W, H);

  const S    = Math.min(W, H);
  const offX = (W - S) / 2;
  const offY = (H - S) / 2;
  const C    = S / 11;
  const R    = C * 0.32;

  ctx.save();
  ctx.translate(offX, offY);

  // Trasa — uproszczona, tylko ramka krzyża
  const path = [
    [6,10],[6,9],[6,8],[6,7],[6,6],
    [6,5],[7,5],[8,5],[9,5],[10,5],
    [10,4],[10,3],[10,2],[10,1],[10,0],
    [9,0],[8,0],[7,0],[6,0],[5,0],
    [4,0],[4,1],[4,2],[4,3],[4,4],
    [4,5],[3,5],[2,5],[1,5],[0,5],
    [0,6],[0,7],[0,8],[0,9],[0,10],
    [1,10],[2,10],[3,10],[4,10],[5,10],
  ];

  // Tło pól
  path.forEach(([col,row]) => {
    ctx.fillStyle = 'rgba(255,255,255,0.05)';
    ctx.beginPath();
    ctx.roundRect(col*C+1, row*C+1, C-2, C-2, 3);
    ctx.fill();
  });

  // Kolorowe pola startowe
  const starts = [[0,'#ff4444'],[10,'#4fc3f7'],[20,'#ffd740'],[30,'#69f0ae']];
  starts.forEach(([idx, clr]) => {
    const [col,row] = path[idx];
    ctx.fillStyle = clr + '55';
    ctx.strokeStyle = clr;
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.roundRect(col*C+1,row*C+1,C-2,C-2,3); ctx.fill();
    ctx.beginPath(); ctx.roundRect(col*C+1.5,row*C+1.5,C-3,C-3,3); ctx.stroke();
  });

  // Bazy (rogi)
  const bases = [
    { color:'#ff4444', cols:[8,9], rows:[8,9] },
    { color:'#4fc3f7', cols:[8,9], rows:[1,2] },
    { color:'#ffd740', cols:[1,2], rows:[1,2] },
    { color:'#69f0ae', cols:[1,2], rows:[8,9] },
  ];
  bases.forEach(({ color, cols, rows }) => {
    for (const col of cols) for (const row of rows) {
      ctx.beginPath();
      ctx.arc(col*C+C/2, row*C+C/2, R, 0, Math.PI*2);
      ctx.fillStyle = color + '55';
      ctx.fill();
      ctx.strokeStyle = color;
      ctx.lineWidth = 1;
      ctx.stroke();
    }
  });

  // Centrum — 4 trójkąty
  const cx = S/2, cy = S/2;
  const colors4 = ['#ff4444','#4fc3f7','#ffd740','#69f0ae'];
  colors4.forEach((clr, i) => {
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(i * Math.PI / 2);
    ctx.beginPath();
    ctx.moveTo(0, -C*0.7);
    ctx.lineTo(-C*0.55, C*0.15);
    ctx.lineTo(C*0.55, C*0.15);
    ctx.closePath();
    ctx.fillStyle = clr + '66';
    ctx.fill();
    ctx.restore();
  });

  // Kilka pionków dla klimatu
  const demopieces = [
    { x: path[3][0], y: path[3][1], c: '#ff4444' },
    { x: path[13][0],y: path[13][1],c: '#4fc3f7' },
    { x: path[23][0],y: path[23][1],c: '#ffd740' },
    { x: path[33][0],y: path[33][1],c: '#69f0ae' },
  ];
  demopieces.forEach(({ x, y, c }) => {
    const px = x*C+C/2, py = y*C+C/2;
    const g = ctx.createRadialGradient(px-R*.3,py-R*.3,1,px,py,R);
    g.addColorStop(0,'#fff'); g.addColorStop(.4,c); g.addColorStop(1,'rgba(0,0,0,0.5)');
    ctx.beginPath(); ctx.arc(px,py,R,0,Math.PI*2);
    ctx.fillStyle = g; ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth=1; ctx.stroke();
  });

  ctx.restore();
});
</script>
</body>
</html>
