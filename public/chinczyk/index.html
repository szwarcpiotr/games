<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Chińczyk</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body {
  background:#0a0a0f; display:flex; flex-direction:column;
  align-items:center; min-height:100vh; min-height:100dvh;
  font-family:'Courier New',monospace; color:#e0e0e0;
  user-select:none; overscroll-behavior:none;
}
#top-bar {
  position:sticky; top:0; z-index:20; background:#0a0a0f;
  width:100%; display:flex; align-items:center;
  justify-content:space-between; padding:10px 12px 8px;
  border-bottom:1px solid #111; gap:8px;
}
#home-btn,#settings-btn {
  background:rgba(255,255,255,0.08); border:1px solid #333;
  color:#aaa; font-size:18px; min-width:40px; min-height:40px;
  border-radius:8px; cursor:pointer; display:flex;
  align-items:center; justify-content:center;
  transition:background .2s,color .2s; flex-shrink:0;
}
#home-btn:active,#settings-btn:active{background:rgba(255,255,255,0.18);color:#fff;}
#settings-btn{visibility:hidden;pointer-events:none;}
@media(max-width:639px){#settings-btn{visibility:visible;pointer-events:auto;}}
h1{font-size:clamp(15px,4.5vw,24px);letter-spacing:clamp(3px,2vw,6px);color:#4fc3f7;text-transform:uppercase;flex:1;text-align:center;}
#turn-banner{width:100%;text-align:center;padding:5px 12px 2px;font-size:clamp(11px,3vw,13px);color:#888;letter-spacing:.5px;min-height:22px;}
#turn-banner.my-turn{color:#4fc3f7;font-weight:bold;}
#settings-panel{position:fixed;top:58px;right:12px;background:#111820;border:1px solid #2a3a4a;border-radius:12px;padding:14px;width:200px;z-index:45;display:none;flex-direction:column;gap:9px;}
#settings-panel.open{display:flex;}
#settings-panel h3{font-size:11px;letter-spacing:2px;color:#4fc3f7;text-transform:uppercase;margin-bottom:3px;}
.setting-option{padding:9px 12px;border:1px solid #2a3a4a;border-radius:8px;cursor:pointer;background:#0d1520;color:#aaa;font-family:'Courier New',monospace;font-size:12px;letter-spacing:1px;display:flex;align-items:center;justify-content:space-between;gap:10px;transition:border-color .15s,background .15s,color .15s;}
.setting-option.active{border-color:#4fc3f7;background:rgba(79,195,247,.1);color:#4fc3f7;}
.setting-label{display:flex;align-items:center;gap:7px;}
.setting-toggle{width:36px;height:20px;border-radius:10px;background:#222;position:relative;flex-shrink:0;transition:background .2s;}
.setting-toggle::after{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:#888;top:2px;left:2px;transition:transform .2s,background .2s;}
.setting-option.active .setting-toggle{background:rgba(79,195,247,.35);}
.setting-option.active .setting-toggle::after{background:#4fc3f7;transform:translateX(16px);}
#board-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:6px;width:100%;}
canvas#board{display:block;touch-action:manipulation;cursor:pointer;}
#controls{display:flex;align-items:center;justify-content:center;gap:14px;padding:8px 12px 6px;width:100%;}
#dice-display{width:clamp(48px,10vw,60px);height:clamp(48px,10vw,60px);border-radius:clamp(8px,2vw,11px);background:linear-gradient(160deg,#fdfdff,#c9c9d6);display:grid;place-items:center;box-shadow:0 4px 12px rgba(0,0,0,.5);flex-shrink:0;}
#dice-display.rolling{animation:diceShake .07s infinite;}
@keyframes diceShake{0%{transform:rotate(-5deg) scale(1.05);}50%{transform:rotate(5deg) scale(1.05);}100%{transform:rotate(-5deg) scale(1.05);}}
#dice-display svg .pip{fill:#1a1a2e;}
#roll-btn{background:#ef5350;color:#fff;border:none;padding:0 24px;height:48px;border-radius:10px;font-family:inherit;font-size:clamp(13px,3.8vw,15px);letter-spacing:1px;cursor:pointer;font-weight:bold;touch-action:manipulation;transition:background .15s,transform .1s;flex:1;max-width:200px;}
#roll-btn:active:not(:disabled){background:#ff7a76;transform:scale(.97);}
#roll-btn:disabled{background:#2a1a1a;color:#554;cursor:not-allowed;}
#roll-info{font-size:clamp(10px,2.8vw,12px);color:#666;letter-spacing:.5px;min-width:70px;text-align:center;}
#bottom-bar{width:100%;display:flex;align-items:center;justify-content:space-between;padding:8px 14px max(14px,env(safe-area-inset-bottom));gap:10px;margin-top:auto;}
#status{font-size:11px;color:#555;letter-spacing:.5px;}
#restart-btn{display:none;background:rgba(255,255,255,.06);border:1px solid #333;color:#666;font-family:inherit;font-size:12px;padding:8px 14px;border-radius:8px;cursor:pointer;letter-spacing:.5px;touch-action:manipulation;transition:background .15s,color .15s,border-color .15s;white-space:nowrap;min-height:36px;}
#restart-btn.voted{border-color:#4fc3f7;color:#4fc3f7;background:rgba(79,195,247,.1);}
#restart-btn:active{background:rgba(255,255,255,.12);}
#overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.88);gap:14px;z-index:50;padding:32px 24px;text-align:center;}
#overlay h2{font-size:clamp(22px,7vw,30px);letter-spacing:4px;color:#4fc3f7;}
#overlay p{color:#aaa;font-size:clamp(12px,3.2vw,14px);max-width:320px;}
#overlay.hidden{display:none;}
#start-btn{background:#4fc3f7;color:#03222e;border:none;padding:14px 32px;border-radius:10px;font-family:inherit;font-size:clamp(14px,4vw,16px);letter-spacing:1px;cursor:pointer;font-weight:bold;touch-action:manipulation;min-width:180px;min-height:50px;transition:background .15s,transform .1s;}
#start-btn:active:not(:disabled){background:#7ad4fb;transform:scale(.97);}
#start-btn:disabled{background:#1a3040;color:#3a6070;cursor:not-allowed;}
#game-over-box{padding:12px 16px;text-align:center;color:#4fc3f7;font-size:clamp(13px,3.8vw,16px);letter-spacing:.5px;line-height:1.6;display:none;}
</style>
</head>
<body>
<div id="overlay">
  <h2>🎲 CHIŃCZYK</h2>
  <p id="overlay-msg">Łączenie z serwerem…</p>
  <button id="start-btn" disabled>Zacznij grę</button>
</div>
<div id="top-bar">
  <button id="home-btn" title="Menu główne">⌂</button>
  <h1>Chińczyk</h1>
  <button id="settings-btn" title="Ustawienia">⚙</button>
</div>
<div id="settings-panel">
  <h3>Ustawienia</h3>
  <div class="setting-option" id="opt-classic">
    <span class="setting-label"><span>🎨</span>Klasyczna plansza</span>
    <span class="setting-toggle"></span>
  </div>
</div>
<div id="turn-banner"></div>
<div id="board-wrap"><canvas id="board"></canvas></div>
<div id="controls">
  <div id="dice-display">
    <svg id="dice-svg" viewBox="0 0 100 100" width="68%" height="68%"></svg>
  </div>
  <button id="roll-btn" disabled>🎲 Rzuć</button>
  <span id="roll-info"></span>
</div>
<div id="game-over-box"></div>
<div id="bottom-bar">
  <span id="status"></span>
  <button id="restart-btn">↺ Restart (0/2)</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const COLORS = ['red','blue','yellow','green'];
// UWAGA: ruch po trasie jest malejący (pos - steps), dlatego pola startowe
// są przesunięte o -2 względem "naturalnych" indeksów (identycznie jak w server.js)
const COLOR_CFG = {
  red:    {startField:38, homeOffset:40, label:'Czerwony'},
  blue:   {startField:8,  homeOffset:44, label:'Niebieski'},
  yellow: {startField:18, homeOffset:48, label:'Żółty'},
  green:  {startField:28, homeOffset:52, label:'Zielony'},
};
const NEON = {
  red:    {main:'#ff4040',glow:'rgba(255,64,64,0.6)',   light:'#ff9090',dark:'#990000'},
  blue:   {main:'#4fc3f7',glow:'rgba(79,195,247,0.6)', light:'#90dfff',dark:'#0277bd'},
  yellow: {main:'#ffd740',glow:'rgba(255,215,64,0.6)', light:'#ffe580',dark:'#b8860b'},
  green:  {main:'#00e676',glow:'rgba(0,230,118,0.6)',  light:'#80ffb8',dark:'#007a3d'},
};
const CLASSIC_PAL = {
  red:    {main:'#c62828',glow:'rgba(198,40,40,0.5)',   light:'#ef9a9a',dark:'#7f0000'},
  blue:   {main:'#1565c0',glow:'rgba(21,101,192,0.5)', light:'#82b1ff',dark:'#003c8f'},
  yellow: {main:'#f9a825',glow:'rgba(249,168,37,0.5)', light:'#ffd95a',dark:'#a07800'},
  green:  {main:'#2e7d32',glow:'rgba(46,125,50,0.5)',  light:'#a5d6a7',dark:'#005005'},
};

const TRACK = (function(){
  const T=[];
  for(let r=10;r>=6;r--) T.push([6,r]);
  for(let c=7;c<=10;c++) T.push([c,6]);
  T.push([10,5]);
  for(let c=10;c>=6;c--) T.push([c,4]);
  for(let r=3;r>=0;r--) T.push([6,r]);
  T.push([5,0]);
  for(let r=0;r<=4;r++) T.push([4,r]);
  for(let c=3;c>=0;c--) T.push([c,4]);
  T.push([0,5]);
  for(let c=0;c<=4;c++) T.push([c,6]);
  for(let r=7;r<=10;r++) T.push([4,r]);
  T.push([5,10]);
  return T;
})();

const HOME_COORDS = {
  red:    [[5,9],[5,8],[5,7],[5,6]],
  blue:   [[9,5],[8,5],[7,5],[6,5]],
  yellow: [[5,1],[5,2],[5,3],[5,4]],
  green:  [[1,5],[2,5],[3,5],[4,5]],
};

const BASE_COORDS = {
  red:    [[8,8],[9,8],[8,9],[9,9]],
  blue:   [[8,1],[9,1],[8,2],[9,2]],
  yellow: [[1,1],[2,1],[1,2],[2,2]],
  green:  [[1,8],[2,8],[1,9],[2,9]],
};

const overlay    = document.getElementById('overlay');
const overlayMsg = document.getElementById('overlay-msg');
const startBtn   = document.getElementById('start-btn');
const turnBanner = document.getElementById('turn-banner');
const boardCanvas= document.getElementById('board');
const ctx        = boardCanvas.getContext('2d');
const rollBtn    = document.getElementById('roll-btn');
const rollInfo   = document.getElementById('roll-info');
const diceSvg    = document.getElementById('dice-svg');
const diceDisp   = document.getElementById('dice-display');
const statusEl   = document.getElementById('status');
const gameOverBox= document.getElementById('game-over-box');
const restartBtn = document.getElementById('restart-btn');

let myColor=null, myIsPlayer=false, myRestartVote=false, classicMode=false;
let pendingTurnEnd=false;
let state={phase:'waiting',players:[],pieces:{},turnIndex:0,dice:null,movablePieces:[],mustRollAgain:false,winner:null};
let CELL=40;

function computeGeometry(){
  const wrap=document.getElementById('board-wrap');
  const avail=Math.min(wrap.clientWidth-12, wrap.clientHeight-4, 540);
  const size=Math.max(avail,200);
  CELL=size/11;
  const dpr=window.devicePixelRatio||1;
  boardCanvas.style.width=size+'px';
  boardCanvas.style.height=size+'px';
  boardCanvas.width=size*dpr;
  boardCanvas.height=size*dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);
}

function cx(col){return col*CELL+CELL*0.5;}
function cy(row){return row*CELL+CELL*0.5;}

function piecePx(piece){
  const cfg=COLOR_CFG[piece.color];
  if(piece.pos===-1){
    const[c,r]=BASE_COORDS[piece.color][piece.id];
    return{x:cx(c),y:cy(r)};
  }
  if(piece.pos===56) return null;
  const h=cfg.homeOffset;
  if(piece.pos>=h&&piece.pos<h+4){
    const[c,r]=HOME_COORDS[piece.color][piece.pos-h];
    return{x:cx(c),y:cy(r)};
  }
  if(piece.pos>=0&&piece.pos<TRACK.length){
    const[c,r]=TRACK[piece.pos];
    return{x:cx(c),y:cy(r)};
  }
  return null;
}

function pal(){return classicMode?CLASSIC_PAL:NEON;}
function rr(x,y,w,h,r){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}

function drawCell(col,row,fillStyle,strokeStyle,lw){
  const x=col*CELL,y=row*CELL;
  if(fillStyle){ctx.fillStyle=fillStyle;rr(x+1,y+1,CELL-2,CELL-2,4);ctx.fill();}
  if(strokeStyle){ctx.strokeStyle=strokeStyle;ctx.lineWidth=lw||1;rr(x+1.5,y+1.5,CELL-3,CELL-3,4);ctx.stroke();}
}

function drawBoard(){
  const S=CELL*11;
  ctx.clearRect(0,0,S,S);
  const p=pal();

  if(classicMode){
    ctx.fillStyle='#f2ede3'; ctx.fillRect(0,0,S,S);
    ctx.fillStyle='#ddd5c4';
    ctx.fillRect(4*CELL,0,3*CELL,S);
    ctx.fillRect(0,4*CELL,S,3*CELL);
  } else {
    ctx.fillStyle='#0a0a0f'; ctx.fillRect(0,0,S,S);
    ctx.fillStyle='rgba(255,255,255,0.02)';
    ctx.fillRect(4*CELL,0,3*CELL,S);
    ctx.fillRect(0,4*CELL,S,3*CELL);
  }

  const START_IDX = {38:'red',8:'blue',18:'yellow',28:'green'};
  TRACK.forEach(([c,r],idx)=>{
    if(classicMode){ drawCell(c,r,'#fffef8','#c4b89a',0.8); }
    else { drawCell(c,r,'rgba(255,255,255,0.06)',null); }
    const sc=START_IDX[idx];
    if(sc){
      if(classicMode) drawCell(c,r,p[sc].main+'44',p[sc].main,2);
      else            drawCell(c,r,p[sc].glow.replace(/[\d.]+\)$/,'0.22)'),p[sc].main,1.5);
    }
  });

  for(const color of COLORS){
    HOME_COORDS[color].forEach(([c,r],i)=>{
      if(classicMode){
        drawCell(c,r,p[color].main+(i===3?'cc':'55'),p[color].main,i===3?2:1);
      } else {
        const a=0.08+i*0.09;
        drawCell(c,r,p[color].glow.replace(/[\d.]+\)$/,a+')'),p[color].main,i===3?2:0.8);
        if(i<3){ctx.globalAlpha=0.35;rr(c*CELL+1.5,r*CELL+1.5,CELL-3,CELL-3,4);ctx.stroke();ctx.globalAlpha=1;}
      }
    });
  }

  for(const color of COLORS){
    const[c0,r0]=BASE_COORDS[color][0];
    const bx=c0*CELL, by=r0*CELL;
    if(classicMode){
      ctx.fillStyle=p[color].main+'33'; rr(bx,by,CELL*2,CELL*2,8); ctx.fill();
    } else {
      ctx.fillStyle=p[color].glow.replace(/[\d.]+\)$/,'0.1)'); rr(bx,by,CELL*2,CELL*2,8); ctx.fill();
    }
    ctx.strokeStyle=p[color].main; ctx.lineWidth=classicMode?2:1.5;
    rr(bx,by,CELL*2,CELL*2,8); ctx.stroke();
    for(const[c,r] of BASE_COORDS[color]){
      ctx.beginPath(); ctx.arc(cx(c),cy(r),CELL*0.28,0,Math.PI*2);
      ctx.strokeStyle=p[color].main+(classicMode?'88':'55');
      ctx.lineWidth=1; ctx.stroke();
    }
  }

  const CA = { red:Math.PI, blue:Math.PI/2, yellow:0, green:3*Math.PI/2 };
  const mx=S/2, my=S/2;
  for(const col of COLORS){
    ctx.save(); ctx.translate(mx,my); ctx.rotate(CA[col]);
    ctx.beginPath();
    ctx.moveTo(0,-CELL*1.35); ctx.lineTo(-CELL*0.8,0); ctx.lineTo(CELL*0.8,0);
    ctx.closePath();
    ctx.fillStyle=classicMode?p[col].main+'99':p[col].glow.replace(/[\d.]+\)$/,'0.5)');
    ctx.fill();
    ctx.restore();
  }

  drawPieces();
}

function drawPieces(){
  if(!state.players.length) return;
  const R=CELL*0.34;
  const p=pal();
  const groups={};
  for(const color of state.players){
    if(!state.pieces[color]) continue;
    for(const piece of state.pieces[color]){
      const pos=piecePx(piece);
      if(!pos) continue;
      const key=Math.round(pos.x)+'_'+Math.round(pos.y);
      if(!groups[key]) groups[key]=[];
      groups[key].push({piece,pos});
    }
  }
  for(const group of Object.values(groups)){
    const n=group.length;
    group.forEach(({piece,pos},gi)=>{
      let ox=0,oy=0;
      if(n===2){const s=R*0.65;ox=gi===0?-s:s;}
      else if(n===3){const a=gi*(2*Math.PI/3)-Math.PI/2;ox=Math.cos(a)*R*0.7;oy=Math.sin(a)*R*0.7;}
      else if(n===4){const o=[[-1,-1],[1,-1],[-1,1],[1,1]];ox=o[gi][0]*R*0.6;oy=o[gi][1]*R*0.6;}
      const px=pos.x+ox, py=pos.y+oy;
      const pc=p[piece.color];
      const isMovable=state.movablePieces?.some(m=>m.color===piece.color&&m.id===piece.id);
      const isMine=piece.color===myColor;
      if(isMovable&&isMine){
        const gr=ctx.createRadialGradient(px,py,R*0.3,px,py,R*2.4);
        gr.addColorStop(0,pc.glow); gr.addColorStop(1,'rgba(0,0,0,0)');
        ctx.beginPath();ctx.arc(px,py,R*2.4,0,Math.PI*2);ctx.fillStyle=gr;ctx.fill();
      }
      ctx.beginPath();ctx.arc(px+1.5,py+2,R,0,Math.PI*2);ctx.fillStyle='rgba(0,0,0,0.45)';ctx.fill();
      const grad=ctx.createRadialGradient(px-R*0.35,py-R*0.38,R*0.05,px,py,R);
      grad.addColorStop(0,pc.light||'#fff');grad.addColorStop(0.4,pc.main);grad.addColorStop(1,pc.dark||'#000');
      ctx.beginPath();ctx.arc(px,py,R,0,Math.PI*2);ctx.fillStyle=grad;ctx.fill();
      ctx.strokeStyle=(isMovable&&isMine)?'rgba(255,255,255,0.9)':'rgba(0,0,0,0.2)';
      ctx.lineWidth=(isMovable&&isMine)?2:1;ctx.stroke();
    });
  }
}

function handleClick(clientX,clientY){
  if(!myIsPlayer||state.phase!=='playing') return;
  if(state.players[state.turnIndex]!==myColor) return;
  if(!state.dice||!state.movablePieces?.length) return;
  const rect=boardCanvas.getBoundingClientRect();
  const sx=(CELL*11)/rect.width, sy=(CELL*11)/rect.height;
  const gx=(clientX-rect.left)*sx, gy=(clientY-rect.top)*sy;
  const hitR=CELL*0.5;
  for(const{color,id}of state.movablePieces){
    if(color!==myColor) continue;
    const piece=state.pieces[color]?.find(p=>p.id===id);
    if(!piece) continue;
    const pos=piecePx(piece);
    if(!pos) continue;
    if(Math.hypot(gx-pos.x,gy-pos.y)<=hitR){
      pendingTurnEnd=(state.dice!==6);
      socket.emit('move',{pieceId:id});
      return;
    }
  }
}
boardCanvas.addEventListener('click',e=>handleClick(e.clientX,e.clientY));
boardCanvas.addEventListener('touchend',e=>{e.preventDefault();const t=e.changedTouches[0];handleClick(t.clientX,t.clientY);},{passive:false});

const PIPS={1:[[50,50]],2:[[28,28],[72,72]],3:[[28,28],[50,50],[72,72]],4:[[28,28],[28,72],[72,28],[72,72]],5:[[28,28],[28,72],[50,50],[72,28],[72,72]],6:[[28,25],[28,50],[28,75],[72,25],[72,50],[72,75]]};
function renderDice(n){if(!n){diceSvg.innerHTML='';return;}diceSvg.innerHTML=PIPS[n].map(([x,y])=>`<circle class="pip" cx="${x}" cy="${y}" r="9"/>`).join('');}

function isMyTurn(){return state.phase==='playing'&&myIsPlayer&&state.players[state.turnIndex]===myColor;}
function render(){computeGeometry();drawBoard();updateBanner();updateRollBtn();renderDice(state.dice);}
function updateBanner(){
  if(state.phase==='waiting'){turnBanner.textContent='';turnBanner.className='';return;}
  if(state.phase==='over'){turnBanner.textContent='Koniec gry';turnBanner.className='';return;}
  if(isMyTurn()){
    turnBanner.textContent='➤ Twoja tura ('+(COLOR_CFG[myColor].label)+')'+(state.mustRollAgain&&state.dice?' — rzuć znów!':'');
    turnBanner.className='my-turn';
  } else if(state.players.length){
    turnBanner.textContent='Tura: '+(COLOR_CFG[state.players[state.turnIndex]]?.label||'');
    turnBanner.className='';
  }
}
function updateRollBtn(){
  rollBtn.disabled=!(isMyTurn()&&(state.dice===null||state.mustRollAgain)&&!pendingTurnEnd);
  if(state.phase==='playing'){
    if(state.dice&&!state.mustRollAgain&&state.movablePieces?.length) rollInfo.textContent='Wybierz pionka';
    else if(state.mustRollAgain) rollInfo.textContent='🎲 Rzuć znów!';
    else rollInfo.textContent='';
  } else rollInfo.textContent='';
}
function updateRestartBtn(count){
  if(!myIsPlayer){restartBtn.style.display='none';return;}
  restartBtn.style.display='block';
  restartBtn.textContent='↺ Restart ('+count+'/'+(state.players.length||2)+')';
  restartBtn.classList.toggle('voted',myRestartVote);
}

// ══════════════════════════════════════════════════════════
// SOCKET — token sesji umożliwia powrót na ten sam kolor
// po zmianie karty lub chwilowej utracie połączenia
// ══════════════════════════════════════════════════════════
const SESSION_KEY = 'chinczyk_token';
const socket = io('/chinczyk', {
  transports: ['websocket', 'polling'],
  auth: { token: sessionStorage.getItem(SESSION_KEY) },
});

socket.on('connect', () => { overlayMsg.textContent = 'Połączono. Czekanie na graczy…'; });

socket.on('assigned', ({ color, isPlayer, token }) => {
  if (token) sessionStorage.setItem(SESSION_KEY, token);
  myColor = color; myIsPlayer = isPlayer;
  if (isPlayer) {
    overlayMsg.textContent = 'Jesteś ' + COLOR_CFG[color].label + '. Czekanie na start…';
    statusEl.textContent = COLOR_CFG[color].label;
  } else {
    overlayMsg.textContent = 'Oglądasz jako widz.';
    statusEl.textContent = 'widz';
  }
  render();
});

socket.on('lobby', ({ players }) => {
  if (state.phase === 'waiting') {
    overlayMsg.textContent = 'Gracze: ' + players + '/4 (min. 2)';
    startBtn.disabled = !(players >= 2 && myIsPlayer);
  }
});

startBtn.addEventListener('click', () => socket.emit('start_game'));

socket.on('state', snap => {
  state = snap;
  if (state.dice !== null || !isMyTurn()) pendingTurnEnd = false;
  if (state.phase === 'playing' || state.phase === 'over') overlay.classList.add('hidden');
  render();
  if (snap.dice) { diceDisp.classList.add('rolling'); setTimeout(() => diceDisp.classList.remove('rolling'), 350); }
});

socket.on('game_over', ({ winner }) => {
  state.phase = 'over'; render();
  gameOverBox.style.display = 'block';
  gameOverBox.innerHTML = '🏆 Wygrywa <span style="color:' + pal()[winner]?.main + '">' + COLOR_CFG[winner]?.label + '</span>!';
});

socket.on('restart', snap => {
  state = snap; myRestartVote = false;
  gameOverBox.style.display = 'none';
  overlay.classList.add('hidden');
  updateRestartBtn(0); render();
});

socket.on('restart_votes', ({ count }) => updateRestartBtn(count));

// Gracz chwilowo wyszedł — grace period 60s, gra zapauzowana
socket.on('player_away', ({ color }) => {
  overlay.classList.remove('hidden');
  overlayMsg.textContent = (COLOR_CFG[color]?.label || color) + ' chwilowo wyszedł. Czekanie na powrót… (60s)';
  startBtn.disabled = true;
});

// Gracz definitywnie wyszedł (po 60s grace period)
socket.on('player_left', ({ color }) => {
  overlay.classList.remove('hidden');
  overlayMsg.textContent = (COLOR_CFG[color]?.label || color) + ' opuścił grę. Czekanie na nowego gracza…';
  startBtn.disabled = true;
});

socket.on('disconnect', () => {
  overlay.classList.remove('hidden');
  overlayMsg.textContent = 'Rozłączono. Odśwież stronę.';
});

rollBtn.addEventListener('click', () => { if (!rollBtn.disabled) socket.emit('roll'); });
restartBtn.addEventListener('click', () => {
  if (!myIsPlayer) return;
  myRestartVote = !myRestartVote;
  socket.emit('restart_vote', { vote: myRestartVote });
});
document.addEventListener('keydown', e => {
  if (e.key.toLowerCase() === 'r' && myIsPlayer) {
    myRestartVote = !myRestartVote;
    socket.emit('restart_vote', { vote: myRestartVote });
  }
});
document.getElementById('home-btn').addEventListener('click', () => { window.location.href = '/'; });
window.addEventListener('resize', () => { computeGeometry(); drawBoard(); });

const settingsBtn   = document.getElementById('settings-btn');
const settingsPanel = document.getElementById('settings-panel');
const optClassic    = document.getElementById('opt-classic');
settingsBtn.addEventListener('click', e => { e.stopPropagation(); settingsPanel.classList.toggle('open'); });
document.addEventListener('click', e => {
  if (!settingsPanel.contains(e.target) && e.target !== settingsBtn) settingsPanel.classList.remove('open');
});
optClassic.addEventListener('click', () => {
  const on = !optClassic.classList.contains('active');
  optClassic.classList.toggle('active', on);
  localStorage.setItem('chinczyk-classic', on ? '1' : '0');
  classicMode = on; drawBoard();
});
if (localStorage.getItem('chinczyk-classic') === '1') { classicMode = true; optClassic.classList.add('active'); }

computeGeometry();
drawBoard();
</script>
</body>
</html>
